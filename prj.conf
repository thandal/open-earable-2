# Audio
CONFIG_AUDIO_BT_MGMT_DFU=y
CONFIG_AUDIO_MIC_I2S=y
CONFIG_BLE_ACL_CONN_INTERVAL=8
CONFIG_BT_AUDIO_RETRANSMITS=2
#CONFIG_BT_AUDIO_MAX_TRANSPORT_LATENCY_MS=20
#CONFIG_BT_AUDIO_PRESENTATION_DELAY_US=40000
CONFIG_FDSP=y
CONFIG_NRF5340_AUDIO=y
CONFIG_NRF5340_AUDIO_CS47L63_DRIVER=y
CONFIG_NRF5340_AUDIO_POWER_MEASUREMENT=n
CONFIG_NRF5340_AUDIO_SD_CARD_MODULE=y
CONFIG_SAMPLE_RATE_CONVERTER=y
CONFIG_SAMPLE_RATE_CONVERTER_FILTER_SIMPLE=y
CONFIG_STREAM_BIDIRECTIONAL=y
# CONFIG_NRFX_PDM=y

# Bluetooth
CONFIG_BT_ATT_PREPARE_COUNT=8
CONFIG_BT_BUF_ACL_RX_SIZE=502
CONFIG_BT_BUF_ACL_TX_SIZE=502
CONFIG_BT_CTLR_DATA_LENGTH_MAX=251
CONFIG_BT_CTLR_ISO_RX_BUFFERS=16
CONFIG_BT_CTLR_ISO_TX_BUFFERS=16
CONFIG_BT_CTLR_PHY_2M=y
CONFIG_BT_CTLR_PHY_CODED=n
CONFIG_BT_CTLR_RX_BUFFERS=8
#CONFIG_BT_CTLR_TX_BUFFERS=8
CONFIG_BT_DEVICE_NAME="OpenEarable"
CONFIG_BT_HCI_CORE_LOG_LEVEL_WRN=y
CONFIG_BT_ISO_RX_BUF_COUNT=8
CONFIG_BT_ISO_TX_BUF_COUNT=4
#CONFIG_BT_ISO_RX_MTU=498
#CONFIG_BT_ISO_TX_MTU=498
CONFIG_BT_L2CAP_DYNAMIC_CHANNEL=y
CONFIG_BT_L2CAP_TX_MTU=498
CONFIG_BT_OBSERVER=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_USER_DATA_LEN_UPDATE=y
CONFIG_BT_USER_PHY_UPDATE=y

# C/C++ runtime
CONFIG_CPP=y
CONFIG_FPU=y
CONFIG_GLIBCXX_LIBCPP=y
CONFIG_NEWLIB_LIBC=y
CONFIG_NEWLIB_LIBC_FLOAT_PRINTF=y
CONFIG_NEWLIB_LIBC_FLOAT_SCANF=y
CONFIG_SFLOAT=y
CONFIG_STD_CPP17=y

# Console
CONFIG_CONSOLE=y
CONFIG_RTT_CONSOLE=y
CONFIG_STDOUT_CONSOLE=y
CONFIG_UART_CONSOLE=y

# Debug
CONFIG_ASSERT=y
CONFIG_DEBUG=y
CONFIG_DEBUG_INFO=y
CONFIG_INIT_STACKS=y
#CONFIG_RESET_ON_FATAL_ERROR=y
CONFIG_STACK_SENTINEL=y
CONFIG_STACK_USAGE=y
CONFIG_THREAD_RUNTIME_STATS=y

# Filesystem / SD card
CONFIG_DISK_ACCESS=y
CONFIG_DISK_DRIVER_SDMMC=y
CONFIG_DISK_DRIVERS=y
CONFIG_FAT_FILESYSTEM_ELM=y
CONFIG_FILE_SYSTEM=y
CONFIG_FS_FATFS_EXFAT=y
CONFIG_FS_FATFS_HAS_RTC=y
CONFIG_FS_FATFS_MOUNT_MKFS=n
CONFIG_SDHC=y
# Suppress LOG_ERR from sd_check_card_type (SPI_SDHC has no card presence method)
CONFIG_SD_LOG_LEVEL_OFF=y

# Flash (external)
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NORDIC_QSPI_NOR=n
CONFIG_SPI_NOR=y
CONFIG_SPI_NOR_FLASH_LAYOUT_PAGE_SIZE=4096
CONFIG_SPI_NOR_SFDP_DEVICETREE=y

# I2C
CONFIG_I2C=y
CONFIG_I2C_NRFX=y
CONFIG_I2C_SHELL=y

# Logging
CONFIG_LOG=y
CONFIG_LOG_BACKEND_RTT=n
CONFIG_LOG_BACKEND_UART=n
CONFIG_LOG_BUFFER_SIZE=8192
CONFIG_LOG_PROCESS_THREAD_SLEEP_MS=100
# CONFIG_LOG_DEFAULT_LEVEL=4
CONFIG_LOG_TAG_DEFAULT="--"
CONFIG_LOG_TAG_MAX_LEN=2
#CONFIG_LOG_THREAD_ID_PREFIX=y
CONFIG_SEGGER_RTT_BUFFER_SIZE_UP=4096
CONFIG_USBD_LOG_LEVEL_WRN=y

# MCUmgr / DFU
CONFIG_BASE64=y
CONFIG_CRC=y
CONFIG_IMG_MANAGER=y
CONFIG_MCUMGR=y
CONFIG_MCUMGR_GRP_IMG=y
CONFIG_MCUMGR_GRP_IMG_STATUS_HOOKS=y
CONFIG_MCUMGR_GRP_IMG_UPLOAD_CHECK_HOOK=y
CONFIG_MCUMGR_GRP_OS=y
CONFIG_MCUMGR_GRP_OS_RESET_HOOK=y
CONFIG_MCUMGR_MGMT_NOTIFICATION_HOOKS=y
CONFIG_MCUMGR_SMP_COMMAND_STATUS_HOOKS=y
CONFIG_MCUMGR_TRANSPORT_BT_PERM_RW=y
CONFIG_MCUMGR_TRANSPORT_UART=n
CONFIG_NET_BUF=y
CONFIG_STREAM_FLASH=y
CONFIG_ZCBOR=y

# Power management
CONFIG_PM=n  # Seems like a good idea, but not currently used in any way.
CONFIG_PM_DEVICE=y
CONFIG_PM_DEVICE_RUNTIME=y
CONFIG_POWEROFF=y

# PWM
CONFIG_NRFX_PWM1=y

# Serial / UART
CONFIG_SERIAL=y
CONFIG_UART_LINE_CTRL=y

# Shell
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_RTT=y
CONFIG_SHELL_BACKEND_SERIAL=n
CONFIG_SHELL_CMD_BUFF_SIZE=128
CONFIG_SHELL_CMDS=n
CONFIG_SHELL_HELP_ON_WRONG_ARGUMENT_COUNT=n
CONFIG_SHELL_HISTORY=y
CONFIG_SHELL_RTT_INIT_LOG_LEVEL_DEFAULT=y
CONFIG_SHELL_STACK_SIZE=4096
CONFIG_SHELL_STATS=n
CONFIG_SHELL_VT100_COLORS=y
CONFIG_SHELL_VT100_COMMANDS=y
CONFIG_SHELL_WILDCARD=n
# Disable default shell commands
CONFIG_CLOCK_CONTROL_NRF_SHELL=n
CONFIG_DEVICE_SHELL=n
CONFIG_FLASH_SHELL=n
CONFIG_HWINFO_SHELL=n
CONFIG_I2C_SHELL=y
CONFIG_KERNEL_SHELL=y
CONFIG_USE_SEGGER_RTT=y

# SPI
CONFIG_SPI=y
CONFIG_SPI_NRFX=y
CONFIG_SPI_NRFX_RAM_BUFFER_SIZE=4096

# Misc
CONFIG_SETUP_FUEL_GAUGE=y
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

# USB
#CONFIG_USB_CDC_ACM_LOG_LEVEL_DBG=y
CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_USBD_CDC_ACM_CLASS=n
# USB Mass Storage
CONFIG_USBD_MSC_CLASS=y
CONFIG_USBD_MSC_LUNS_PER_INSTANCE=1
CONFIG_USBD_MSC_SCSI_BUFFER_SIZE=16384
CONFIG_SAMPLE_USBD_MANUFACTURER="OpenEarable"
CONFIG_SAMPLE_USBD_PID=0x0004
CONFIG_SAMPLE_USBD_PRODUCT="OpenEarable v2"
CONFIG_SAMPLE_USBD_SELF_POWERED=y

CONFIG_NCS_BOOT_BANNER=y
CONFIG_NCS_APPLICATION_BOOT_BANNER_STRING="OpenEarable v2"